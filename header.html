<!-- header.html -->
<style>
.search-bar-row{display:flex!important;align-items:center!important;gap:8px!important;width:100%!important;max-width:500px!important;}
.search-bar-row .header-search-wrap{flex:1!important;max-width:none!important;}
.header-sub{padding-top:2px!important;padding-bottom:4px!important;}
@media(max-width:600px){
  .search-bar-row{max-width:100%!important;}
  .header-sub{padding:4px 12px!important;}
}
</style>
<div class="header-wrapper">
  <div class="header-container">
    <div class="header-left">
      <a href="index.html"><img src="images/logo.png" alt="Taster Media Logo" class="logo" /></a>
      <h1 class="glow-text">Taster Media</h1>
    </div>
  </div>
  <div class="header-sub">
    <div class="search-bar-row">
      <a href="contact.html" class="nav-contact" data-page="contact">Contact</a>
      <div class="header-search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="Search videos..." autocomplete="off" />
        <div id="searchResults" class="search-results"></div>
      </div>
    </div>
    <div class="header-sort">
      <span class="sort-label">Sort</span>
      <div class="sort-buttons">
        <button class="type-btn active" data-type="all">All</button>
        <button class="type-btn" data-type="multi">Multi-cam</button>
        <button class="type-btn" data-type="single">Single-cam</button>
        <button class="type-btn" data-type="360">360°</button>
      </div>
      <div class="sort-buttons">
        <button class="sort-btn active" data-field="date">Date ↓</button>
        <button class="sort-btn" data-field="views">Views ↓</button>
      </div>
    </div>
  </div>
</div>
<script>var page=window.location.pathname.split('/').pop().replace('.html','');document.querySelectorAll('.nav-contact').forEach(function(a){if((a.dataset.page||'')===(page||'index'))a.classList.add('active');});</script>
