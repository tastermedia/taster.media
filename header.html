<header>
  <div class="header-container">
    <a href="index.html">
      <img src="images/logo.png" alt="Taster Media Logo" class="logo" />
    </a>
    <h1 class="glow-text">Taster Media</h1>
    <nav>
      <a href="index.html" class="nav-link" data-page="index">4K Multi-cam</a>
      <a href="360.html" class="nav-link" data-page="360">360&#176; Videos</a>
      <a href="about.html" class="nav-link" data-page="about">About</a>
      <a href="contact.html" class="nav-link" data-page="contact">Contact</a>
    </nav>
  </div>
</header>
<script>
  // Highlight active nav link based on current page
  const page = window.location.pathname.split("/").pop().replace(".html","") || "index";
  document.querySelectorAll(".nav-link[data-page]").forEach(a => {
    if (a.dataset.page === page || (page === "" && a.dataset.page === "index")) {
      a.classList.add("active");
    }
  });
</script>
