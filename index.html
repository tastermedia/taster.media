</head>
<body>
  <div id="header-placeholder"></div>
  <script>fetch("header.html?d="+Math.floor(Date.now()/86400000)).then(function(r){return r.text();}).then(function(h){document.getElementById("header-placeholder").outerHTML=h;document.dispatchEvent(new Event("headerReady"));}).catch(function(){document.getElementById("header-placeholder").innerHTML='<nav style="padding:1rem"><a href="/">Taster Media</a></nav>';document.dispatchEvent(new Event("headerReady"));});</script>
  <main>
    <section class="playlist-section">
      <div id="videoCount" class="video-count"></div>
      <div class="grid" id="allVideosGrid"></div>
    </section>
  </main>
  <footer>
    <div class="footer-inner">
      <p class="footer-copy">© 2026 Taster Media</p>
    </div>
  </footer>
  <button id="scrollTopBtn">&#9650;</button>
  <script src="scripts.js"></script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});}</script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
