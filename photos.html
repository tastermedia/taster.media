<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos - Taster Media</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- DYNAMIC HEADER -->
  <div id="header-placeholder"></div>
  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(html => { document.getElementById('header-placeholder').innerHTML = html;;var hs=document.querySelector('.header-sort');if(hs)hs.style.display='none';var sw=document.querySelector('.header-search-wrap');if(sw){var lnk=document.createElement('a');lnk.href='index.html';lnk.className='nav-back-search';lnk.textContent='🔎 Browse videos';sw.parentNode.replaceChild(lnk,sw);}var nav=document.querySelector('.nav-contact');if(nav){nav.textContent='← Videos';nav.href='index.html';} })
      .catch(console.error);
  </script>

  <main>
    <h2 class="glow-text">📸 Instagram Feed</h2>
    <!-- Paste your IG embed code here -->
    <div class="ig-embed">
      <!-- e.g.: <iframe src="https://www.instagram.com/...embed" ...></iframe> -->
    </div>
  </main>

  <div class="contact-container">
    <a href="mailto:taster@taster.media" class="contact-button">📩 Email Us</a>
  </div>

  <footer>
    <p>&copy; 2026 Taster Media</p>
  </footer>
</body>
</html>
