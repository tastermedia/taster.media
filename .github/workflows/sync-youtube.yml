name: Sync YouTube Live Videos

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit videos.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live videos from YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_videos.py

      - name: Commit and push videos.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          # Only commit if videos.json actually changed
          if git diff --cached --quiet; then
            echo "No changes to videos.json — skipping commit."
          else
            git commit -m "chore: sync YouTube live videos [$(date -u '+%Y-%m-%d')]"
            git push
          fi
