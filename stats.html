<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats - Taster Media</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="images/logo.webp" type="image/webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=36" />
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c69e4bd3-9a78-4f4c-a5af-211a68e70b28"></script>
  <style>
    .stats-wrap{max-width:1180px;margin:0 auto;padding:22px 16px 48px;}
    .stats-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
    .stats-head h2{margin:0;}
    .stats-sub{opacity:.72;font-size:.9rem;margin:0 0 16px;max-width:680px;}
    .stats-open{font-size:.85rem;text-decoration:none;border:1px solid currentColor;border-radius:999px;padding:7px 15px;opacity:.85;white-space:nowrap;transition:opacity .15s;}
    .stats-open:hover{opacity:1;}
    .stats-frame-card{border:1px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden;background:#0d0d0f;box-shadow:0 10px 34px rgba(0,0,0,.4);}
    .stats-frame-card iframe{display:block;width:100%;height:calc(100vh - 240px);min-height:720px;border:0;background:#0d0d0f;}
    .stats-note{opacity:.5;font-size:.78rem;margin-top:12px;text-align:center;}
    .stats-note a{color:inherit;}
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <script src="header.js"></script>
  <main>
    <div class="stats-wrap">
      <div class="stats-head">
        <h2 class="glow-text">Site Analytics</h2>
        <a class="stats-open" href="https://cloud.umami.is/share/iYmxeU1mtR5I8CLP" target="_blank" rel="noopener">Open full dashboard &#8599;</a>
      </div>
      <p class="stats-sub">Live traffic for taster.media &mdash; visitors, page views, referrers, countries and devices. Cookieless; no personal data collected.</p>
      <div class="stats-frame-card">
        <iframe src="https://cloud.umami.is/share/iYmxeU1mtR5I8CLP" title="Taster Media analytics dashboard" loading="lazy"></iframe>
      </div>
      <p class="stats-note">Updates in real time. If the dashboard doesn&rsquo;t appear above, use <a href="https://cloud.umami.is/share/iYmxeU1mtR5I8CLP" target="_blank" rel="noopener">Open full dashboard</a>.</p>
    </div>
  </main>
  <footer><p>&copy; <span class="footer-year">2026</span> Taster Media</p></footer>
  <script>(function(){var y=document.querySelector('.footer-year');if(y)y.textContent=new Date().getFullYear();})();</script>
</body>
</html>
