<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Taster Media</title>
  <meta name="description" content="Page not found." />
  <link rel="canonical" href="https://taster.media/404.html" />
  <link rel="icon" href="images/logo.webp" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=39" />
  <style>
    .not-found{min-height:calc(100vh - 200px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
    .not-found-code{font-family:'Rajdhani',sans-serif;font-size:clamp(6rem,18vw,12rem);font-weight:700;line-height:1;background:linear-gradient(135deg,#cc88ff,#ff66ff);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:0.04em;text-shadow:0 0 60px rgba(128,0,255,0.4);margin-bottom:0.2em;}
    .not-found-headline{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:600;color:#cc88ff;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:18px;}
    .not-found-text{font-family:'Josefin Sans',sans-serif;font-size:0.95rem;color:#999;max-width:480px;line-height:1.6;margin-bottom:32px;}
    .not-found-cta{display:inline-block;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#cc88ff;text-decoration:none;padding:12px 28px;border:1px solid #8000ff;border-radius:999px;background:rgba(128,0,255,0.12);transition:all 0.2s ease;}
    .not-found-cta:hover{background:rgba(128,0,255,0.3);box-shadow:0 0 20px rgba(128,0,255,0.5);transform:translateY(-1px);}
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <script src="header.js"></script>
  <main class="not-found">
    <div class="not-found-code">404</div>
    <div class="not-found-headline">Off the setlist</div>
    <p class="not-found-text">The page you're looking for didn't show up to the gig. The video archive is still here though.</p>
    <a href="/" class="not-found-cta">← Back to the archive</a>
  </main>
  <footer>
    <div class="footer-inner">
      <p class="footer-copy">© <span class="footer-year">2026</span> Taster Media</p>
    </div>
  </footer>
</body>
</html>
